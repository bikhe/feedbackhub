version: "3.9"

services:
  db:
    image: postgres:15-alpine
    container_name: feedbackhub_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: feedbackhub
      POSTGRES_USER: feedbackhub_user
      POSTGRES_PASSWORD: feedbackhub_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U feedbackhub_user -d feedbackhub"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: feedbackhub_backend
    restart: unless-stopped
    command: >
      sh -c "
        python manage.py migrate &&
        python manage.py collectstatic --noinput &&
        gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3 --timeout 120
      "
    environment:
      - DEBUG=1
      - DATABASE_NAME=feedbackhub
      - DATABASE_USER=feedbackhub_user
      - DATABASE_PASSWORD=feedbackhub_pass
      - DATABASE_HOST=db
      - DATABASE_PORT=5432
      - SECRET_KEY=django-super-secret-key-change-in-production-123
      - ALLOWED_HOSTS=localhost,127.0.0.1,backend
      - CORS_ALLOWED_ORIGINS=http://localhost:3000,http://127.0.0.1:3000
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - backend_static:/app/staticfiles
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: feedbackhub_frontend
    restart: unless-stopped
    environment:
      - REACT_APP_API_URL=http://localhost:8000/
      - WATCHPACK_POLLING=true
    ports:
      - "3000:3000"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    depends_on:
      - backend
    stdin_open: true
    tty: true

volumes:
  postgres_data:
  backend_static: